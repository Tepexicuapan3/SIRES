name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    env:
      VITE_APP_NAME: SIRES
      VITE_APP_VERSION: ci
      VITE_API_URL: /api/v1
      VITE_API_TIMEOUT: "3000"
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test (no watch)
        run: bun run test:run

  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config

      - name: Build CI requirements (without MySQL native driver)
        run: grep -Ev '^mysqlclient==' requirements.txt > /tmp/requirements-ci.txt

      - name: Install Python dependencies
        run: pip install -r /tmp/requirements-ci.txt

      - name: Run Django tests
        run: python manage.py test

  docker-compose-validate:
    name: docker-compose-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Docker Compose
        run: docker compose config
