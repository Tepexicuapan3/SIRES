name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prohibited-tracked-files:
    name: prohibited-tracked-files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check prohibited tracked files
        run: bash .github/workflows/check-prohibited-tracked-files.sh

  frontend-core:
    name: frontend-core
    runs-on: ubuntu-latest
    env:
      # KAN-74 Wave 2: prefer institutional name SISEM in CI surfaces.
      VITE_APP_NAME: SISEM
      VITE_APP_VERSION: ci
      VITE_API_URL: /api/v1
      VITE_API_TIMEOUT: "3000"
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test (no watch)
        run: bun run test:run

  frontend-quality-gates:
    name: frontend-gate-${{ matrix.gate }}
    runs-on: ubuntu-latest
    env:
      VITE_APP_NAME: SISEM
      VITE_APP_VERSION: ci
      VITE_API_URL: /api/v1
      VITE_API_TIMEOUT: "3000"
    strategy:
      fail-fast: false
      matrix:
        gate:
          - typecheck:app
          - typecheck:tests
          - typecheck:e2e
          - typecheck:bun
          - proof:ts-debt-detection
          - contract:auth-alignment
          - guard:ts-anti-bypass
          - guard:legacy-alias
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run selected gate
        run: |
          case "${{ matrix.gate }}" in
            "typecheck:app") bun run typecheck:app ;;
            "typecheck:tests") bun run typecheck:tests ;;
            "typecheck:e2e") bun run typecheck:e2e ;;
            "typecheck:bun") bun run typecheck:bun ;;
            "proof:ts-debt-detection") bun run test:guard:ts-debt-detection ;;
            "contract:auth-alignment") bun run test:run src/test/integration/contracts/auth-contract-alignment.spec.ts ;;
            "guard:ts-anti-bypass") bun run test:guard:ts-anti-bypass ;;
            "guard:legacy-alias") bun run test:guard:legacy-alias ;;
            *) echo "Unknown gate: ${{ matrix.gate }}" && exit 1 ;;
          esac

  tooling-naming-compat:
    name: tooling-naming-compat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate SISEM naming + legacy compatibility
        run: bash .github/workflows/check-tooling-naming.sh

  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config

      - name: Build CI requirements (without MySQL native driver)
        run: grep -Ev '^mysqlclient==' requirements.txt > /tmp/requirements-ci.txt

      - name: Install Python dependencies
        run: pip install -r /tmp/requirements-ci.txt

      - name: Run Django tests
        run: python manage.py test

  auth-contract-governance:
    name: auth-contract-governance
    runs-on: ubuntu-latest
    env:
      VITE_APP_NAME: SISEM
      VITE_APP_VERSION: ci
      VITE_API_URL: /api/v1
      VITE_API_TIMEOUT: "3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config

      - name: Build backend CI requirements
        working-directory: backend
        run: grep -Ev '^mysqlclient==' requirements.txt > /tmp/requirements-ci.txt

      - name: Install backend dependencies
        run: pip install -r /tmp/requirements-ci.txt

      - name: Run backend auth contract gates
        working-directory: backend
        run: python manage.py test apps.authentication.tests.test_auth_api apps.authentication.tests.test_auth_contract_edges

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run frontend auth contract alignment gate
        working-directory: frontend
        run: bun run test:run src/test/integration/contracts/auth-contract-alignment.spec.ts

      - name: Run frontend typecheck gates
        working-directory: frontend
        run: bun run typecheck:app && bun run typecheck:tests

  docker-compose-validate:
    name: docker-compose-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Docker Compose
        run: docker compose config
