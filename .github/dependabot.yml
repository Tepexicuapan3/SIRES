version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "America/Mexico_City"
    # Solo seguridad: desactiva version updates normales.
    # Dependabot security updates siguen habilitados en GitHub settings.
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "frontend"
    groups:
      frontend-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:15"
      timezone: "America/Mexico_City"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "backend"
    groups:
      backend-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "America/Mexico_City"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
