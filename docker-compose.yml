x-proxy-build-args: &proxy-build-args
  HTTP_PROXY: ${HTTP_PROXY-}
  HTTPS_PROXY: ${HTTPS_PROXY-}
  NO_PROXY: ${NO_PROXY-localhost,127.0.0.1,backend,redis,10.15.15.76,host.docker.internal}

services:
  # === FRONTEND (React + Bun) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args: *proxy-build-args
    container_name: sires-frontend
    ports:
      - "${FRONTEND_PORT-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=${VITE_API_URL-}
      - VITE_BACKEND_PORT=${VITE_BACKEND_PORT-${BACKEND_PORT-5000}}
      - VITE_DEV_PROXY_TARGET=${VITE_DEV_PROXY_TARGET-http://backend:5000}
      - VITE_VISITS_STREAM_PATH=${VITE_VISITS_STREAM_PATH-/ws/v1/visits/stream}
      - VITE_VISITS_STREAM_URL=${VITE_VISITS_STREAM_URL-}
      - SIRES_HOST=${SIRES_HOST-localhost}
    command: sh -lc "bun install && unset http_proxy https_proxy no_proxy HTTP_PROXY HTTPS_PROXY NO_PROXY && bun run dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    networks:
      - sires-network

  # === BACKEND (Django/DRF) ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args: *proxy-build-args
    container_name: sires-backend
    ports:
      - "${BACKEND_PORT-5000}:5000"
    volumes:
      - ./backend:/app
    # Evita que el autoreloader deje el container "up" pero sin responder
    command: sh -lc "unset http_proxy https_proxy no_proxy HTTP_PROXY HTTPS_PROXY NO_PROXY && python -c \"import os,time,MySQLdb; host=os.getenv('DB_HOST','mysql'); port=int(os.getenv('DB_PORT','3306')); user=os.getenv('DB_USER','sires'); password=os.getenv('DB_PASSWORD','112233'); db=os.getenv('DB_NAME','sires'); code='''for _ in range(60):\\n    try:\\n        conn=MySQLdb.connect(host=host,user=user,passwd=password,db=db,port=port); conn.close(); break\\n    except Exception:\\n        time.sleep(2)\\nelse:\\n    raise SystemExit('DB not ready')\\n'''; exec(code)\" && python manage.py migrate && python manage.py shell -c \"import seed_e2e; seed_e2e.run()\" && (python -c \"import importlib.util,sys; sys.exit(0 if importlib.util.find_spec('daphne') else 1)\" || pip install --no-cache-dir daphne==4.1.2) && DJANGO_SETTINGS_MODULE=config.settings daphne -b 0.0.0.0 -p 5000 config.asgi:application"
    restart: unless-stopped
    environment:
      TZ: "America/Mexico_City"
      ALLOW_ALL_HOSTS: ${ALLOW_ALL_HOSTS-true}
      ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS-*}
      CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS-http://localhost:5173,http://127.0.0.1:5173}
      CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS-http://localhost:5173,http://127.0.0.1:5173}
      WS_ALLOW_ALL_ORIGINS: ${WS_ALLOW_ALL_ORIGINS-false}
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS-}
      DB_HOST: ${DB_HOST-mysql}
      DB_PORT: ${DB_PORT-3306}
      DB_NAME: ${DB_NAME-sires}
      DB_USER: ${DB_USER-sires}
      DB_PASSWORD: ${DB_PASSWORD-112233}
      CHANNEL_REDIS_URL: ${CHANNEL_REDIS_URL-redis://redis:6379/1}
      SIRES_HOST: ${SIRES_HOST-localhost}
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sires-network

  mysql:
    image: mysql:8.4
    container_name: sires-mysql
    restart: unless-stopped
    environment:
      TZ: "America/Mexico_City"
      MYSQL_DATABASE: ${DB_NAME-sires}
      MYSQL_USER: ${DB_USER-sires}
      MYSQL_PASSWORD: ${DB_PASSWORD-112233}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD-root}
    ports:
      - "${DB_PORT-3306}:3306"
    volumes:
      - mysql-data-sires:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - sires-network

  # === REDIS (Base de datos OTP) ===
  redis:
    image: redis:7-alpine
    container_name: sires-redis
    ports:
      - "${REDIS_PORT-6379}:6379"
    networks:
      - sires-network

# Red interna
networks:
  sires-network:
    driver: bridge

volumes:
  mysql-data-sires:
