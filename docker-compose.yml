services:
  # === FRONTEND (React + Bun) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
        NO_PROXY: ${NO_PROXY-}
    container_name: sires-frontend
    ports:
      - "${FRONTEND_PORT-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://${SIRES_HOST-localhost}:${BACKEND_PORT-5000}/api/v1
      - HTTP_PROXY=${HTTP_PROXY-}
      - HTTPS_PROXY=${HTTPS_PROXY-}
      - NO_PROXY=${NO_PROXY-localhost,127.0.0.1,::1,backend,frontend,redis,sires-backend,sires-frontend,host.docker.internal}
    command: sh -lc "bun install && bun run dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sires-network

  # === BACKEND (Django/DRF) ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
        NO_PROXY: ${NO_PROXY-}
    container_name: sires-backend
    ports:
      - "${BACKEND_PORT-5000}:5000"
    volumes:
      - ./backend:/app
    # Evita que el autoreloader deje el container "up" pero sin responder
    command: python manage.py runserver 0.0.0.0:5000 --noreload
    environment:
      TZ: "America/Mexico_City"
      ALLOWED_HOSTS: localhost,127.0.0.1,${SIRES_HOST-localhost}
      CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT-5173},http://${SIRES_HOST-localhost}:${FRONTEND_PORT-5173}
      HTTP_PROXY: ${HTTP_PROXY-}
      HTTPS_PROXY: ${HTTPS_PROXY-}
      NO_PROXY: ${NO_PROXY-localhost,127.0.0.1,::1,backend,frontend,redis,sires-backend,sires-frontend,host.docker.internal}
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      redis:
        condition: service_started
    networks:
      - sires-network

  # === REDIS (Base de datos OTP) ===
  redis:
    image: redis:7-alpine
    container_name: sires-redis
    ports:
      - "${REDIS_PORT-6379}:6379"
    networks:
      - sires-network

# Red interna
networks:
  sires-network:
    driver: bridge
