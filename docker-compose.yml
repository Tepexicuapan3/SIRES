x-proxy-build-args: &proxy-build-args
  HTTP_PROXY: ${HTTP_PROXY-}
  HTTPS_PROXY: ${HTTPS_PROXY-}
  NO_PROXY: ${NO_PROXY-localhost,127.0.0.1,backend,redis,10.15.15.76,host.docker.internal}

services:
  # === FRONTEND (React + Bun) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args: *proxy-build-args
    container_name: sires-frontend
    ports:
      - "${FRONTEND_PORT-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=${VITE_API_URL-}
      - VITE_BACKEND_PORT=${VITE_BACKEND_PORT-${BACKEND_PORT-5000}}
      - VITE_DEV_PROXY_TARGET=${VITE_DEV_PROXY_TARGET-http://backend:5000}
      - VITE_VISITS_STREAM_PATH=${VITE_VISITS_STREAM_PATH-/ws/v1/visits/stream}
      - VITE_VISITS_STREAM_URL=${VITE_VISITS_STREAM_URL-}
      - VITE_VISITS_STREAM_HEARTBEAT_INTERVAL_MS=${VITE_VISITS_STREAM_HEARTBEAT_INTERVAL_MS-30000}
      - VITE_VISITS_STREAM_HEARTBEAT_TIMEOUT_MS=${VITE_VISITS_STREAM_HEARTBEAT_TIMEOUT_MS-10000}
      - VITE_VISITS_STREAM_BACKOFF_BASE_MS=${VITE_VISITS_STREAM_BACKOFF_BASE_MS-1000}
      - VITE_VISITS_STREAM_BACKOFF_MAX_MS=${VITE_VISITS_STREAM_BACKOFF_MAX_MS-30000}
      - VITE_VISITS_STREAM_JITTER_RATIO=${VITE_VISITS_STREAM_JITTER_RATIO-0.1}
      - VITE_VISITS_STREAM_DISCONNECT_GRACE_MS=${VITE_VISITS_STREAM_DISCONNECT_GRACE_MS-1500}
      - SIRES_HOST=${SIRES_HOST-localhost}
    command: sh -lc "bun install && unset http_proxy https_proxy no_proxy HTTP_PROXY HTTPS_PROXY NO_PROXY && bun run dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    networks:
      - sires-network

  # === BACKEND (Django/DRF) ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args: *proxy-build-args
    container_name: sires-backend
    ports:
      - "${BACKEND_PORT-5000}:5000"
    volumes:
      - ./backend:/app
    command: sh /app/start-docker.sh
    restart: unless-stopped
    environment:
      TZ: "America/Mexico_City"
      ALLOW_ALL_HOSTS: ${ALLOW_ALL_HOSTS-true}
      ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS-*}
      CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS-http://localhost:5173,http://127.0.0.1:5173}
      CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS-http://localhost:5173,http://127.0.0.1:5173}
      WS_ALLOW_ALL_ORIGINS: ${WS_ALLOW_ALL_ORIGINS-false}
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS-}
      EMAIL_BACKEND: ${EMAIL_BACKEND-django.core.mail.backends.console.EmailBackend}
      ALLOW_USER_CREATE_WITHOUT_EMAIL: ${ALLOW_USER_CREATE_WITHOUT_EMAIL-true}
      AUTO_RUN_SEED: ${AUTO_RUN_SEED-false}
      CHANNEL_REDIS_URL: ${CHANNEL_REDIS_URL-redis://redis:6379/1}
      SIRES_HOST: ${SIRES_HOST-localhost}
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      redis:
        condition: service_started
    networks:
      - sires-network

  # === REDIS (Base de datos OTP) ===
  redis:
    image: redis:7-alpine
    container_name: sires-redis
    ports:
      - "${REDIS_PORT-6379}:6379"
    networks:
      - sires-network

# Red interna
networks:
  sires-network:
    driver: bridge
