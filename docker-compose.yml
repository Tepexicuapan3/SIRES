services:
  # === FRONTEND (React + Bun) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sires-frontend
    ports:
      - "${FRONTEND_PORT-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://${SIRES_HOST-192.168.68.106}:${BACKEND_PORT-5000}/api/v1
      - SIRES_HOST=${SIRES_HOST-192.168.68.106}
    command: sh -lc "bun install && bun run dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sires-network

  # === BACKEND (Django/DRF) ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sires-backend
    ports:
      - "${BACKEND_PORT-5000}:5000"
    volumes:
      - ./backend:/app
    # Evita que el autoreloader deje el container "up" pero sin responder
    command: sh -lc "python -c \"import os,time,MySQLdb; host=os.getenv('DB_HOST','10.15.15.76'); port=int(os.getenv('DB_PORT','3306')); user=os.getenv('DB_USER','mysql'); password=os.getenv('DB_PASSWORD','mysql'); db=os.getenv('DB_NAME','sires'); code='''for _ in range(60):\\n    try:\\n        conn=MySQLdb.connect(host=host,user=user,passwd=password,db=db,port=port); conn.close(); break\\n    except Exception:\\n        time.sleep(2)\\nelse:\\n    raise SystemExit('DB not ready')\\n'''; exec(code)\" && python manage.py migrate && python manage.py shell -c \"import seed_e2e; seed_e2e.run()\" && python manage.py runserver 0.0.0.0:5000 --noreload"
    restart: unless-stopped
    environment:
      TZ: "America/Mexico_City"
      ALLOWED_HOSTS: localhost,127.0.0.1,${SIRES_HOST-192.168.68.106},backend,sires-backend
      CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT-5173},http://${SIRES_HOST-192.168.68.106}:${FRONTEND_PORT-5173}
      DB_HOST: ${DB_HOST-10.15.15.76}
      DB_PORT: ${DB_PORT-3306}
      DB_NAME: ${DB_NAME-sires}
      DB_USER: ${DB_USER-sires}
      DB_PASSWORD: ${DB_PASSWORD-112233}
      SIRES_HOST: ${SIRES_HOST-192.168.68.106}
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      redis:
        condition: service_started
    networks:
      - sires-network

  # === REDIS (Base de datos OTP) ===
  redis:
    image: redis:7-alpine
    container_name: sires-redis
    ports:
      - "${REDIS_PORT-6379}:6379"
    networks:
      - sires-network

# Red interna
networks:
  sires-network:
    driver: bridge

